version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: adsoleo_postgres
    environment:
      POSTGRES_USER: adsoleo
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: adsoleo_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
